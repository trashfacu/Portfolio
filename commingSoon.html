<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FMZZTT</title>
        <link rel="stylesheet" href="./css/styles-lockscreen.css" />
        <link rel="shortcut icon" href="./assets/neo.png"/>
      </head>
<body>
    <main>
        <section id="id-welcomeScreen">

            <span class="WelcomeScreenContainer">
                <p class="Title">Comming</p>
                <img src="./assets/LockScreenGif.gif" alt="lockScreenImg">
                <p class="Title">Soon</p>
            </span>

            </section>
            <section id="id-password">
                <form action="" id="formPasswd">
                    <div class="row w-100">
                        <div class="field w-150">
                            <label class="glow text PasswordTitle">Password</label>
                            <input type="password" pattern="\w+" id="password"/>
                        </div>
                    </form>
        </section>

    </main>
    <script src="./scripts/script-lockscreen.js"></script>
</body>
</html>
